syntax = "proto3";

package compat;

option go_package = "github.com/pinealctx/gcode/testdata/compat/dao;dao";

import "buf/validate/validate.proto";
import "person.create.proto";
import "person.update.proto";

message CreatePersonResponse {
  string id = 1;
}

message GetPersonRequest {
  string id = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 64
  ];
}

message GetPersonResponse {
  string name = 1;
  int32 age = 2;
}

message UpdatePersonResponse {
  bool ok = 1;
}

message DeletePersonRequest {
  string id = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 64
  ];
}

message DeletePersonResponse {
  bool ok = 1;
}

// PersonService provides CRUD operations for person records.
service PersonService {
  // CreatePerson creates a new person record.
  rpc CreatePerson(PersonCreate) returns (CreatePersonResponse);
  rpc GetPerson(GetPersonRequest) returns (GetPersonResponse);
  // UpdatePerson updates an existing person record by name.
  rpc UpdatePerson(PersonUpdateByName) returns (UpdatePersonResponse);
  rpc DeletePerson(DeletePersonRequest) returns (DeletePersonResponse);
}

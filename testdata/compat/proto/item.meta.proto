syntax = "proto3";

package compat;

option go_package = "github.com/pinealctx/gcode/testdata/compat/dao;dao";

import "buf/validate/validate.proto";
import "gcode/options.proto";
import "common.proto";

option (gcode.schema) = {};

// Item uses cross-file enum (ItemKind) and cross-file message (Dimensions)
// from common.proto. This tests that gen-proto correctly adds import "common.proto"
// to the generated item.create.proto and item.update.proto.
message Item {
  option (gcode.message) = {
    gorm: { table: "items" }
  };

  int64      id         = 1;
  string     name       = 2 [(buf.validate.field).string = {min_len: 1, max_len: 200}];
  ItemKind   kind       = 3 [(buf.validate.field).enum.defined_only = true];
  Dimensions dimensions = 4 [(buf.validate.field).required = true];
  int64      created_at = 5;

  option (gcode.update_message) = {
    name: "ItemUpdate"
    condition_fields: ["id"]
    ignore_fields: ["created_at"]
  };

  option (gcode.create_message) = {
    name: "ItemCreate"
    ignore_fields: ["id", "created_at"]
    required_fields: ["name", "kind"]
  };
}
